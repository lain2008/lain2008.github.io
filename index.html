<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>// 深渊回响</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma Shan Zheng&family=ZCOOL+KuaiLe&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-void: #050508;
            --bg-deep: #0a0810;
            --text-flesh: #a89888;
            --text-dim: #5a5048;
            --glow-cyan: #4af7ff;
            --glow-purple: #a855f7;
            --glow-green: #22c55e;
            --eldritch-red: #8b1538;
            --tentacle: #2dd4bf;
        }
        
        body {
            font-family: 'ZCOOL KuaiLe', cursive, 'Share Tech Mono', monospace;
            background: var(--bg-void);
            color: var(--text-flesh);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* 深渊背景渐变 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(139,21,56,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(74,247,255,0.08) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 50%, rgba(168,85,247,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
            animation: voidPulse 15s ease-in-out infinite;
        }
        
        @keyframes voidPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* CRT扫描线 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 3px,
                rgba(0,0,0,0.15) 3px,
                rgba(0,0,0,0.15) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }
        
        .noise {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.04;
            pointer-events: none;
            z-index: 9998;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }
        
        /* 触手装饰 */
        .tentacle-left, .tentacle-right {
            position: fixed;
            bottom: 0;
            width: 150px;
            height: 300px;
            pointer-events: none;
            z-index: 1;
            opacity: 0.3;
        }
        
        .tentacle-left {
            left: -50px;
            background: linear-gradient(90deg, var(--tentacle) 0%, transparent 100%);
            clip-path: polygon(100% 0%, 100% 30%, 60% 50%, 100% 70%, 100% 100%, 0% 100%, 0% 0%);
            animation: tentacleWave 8s ease-in-out infinite;
        }
        
        .tentacle-right {
            right: -50px;
            background: linear-gradient(-90deg, var(--tentacle) 0%, transparent 100%);
            clip-path: polygon(0% 0%, 0% 30%, 40% 50%, 0% 70%, 0% 100%, 100% 100%, 100% 0%);
            animation: tentacleWave 8s ease-in-out infinite reverse;
        }
        
        @keyframes tentacleWave {
            0%, 100% { transform: translateY(0) skewX(0deg); }
            25% { transform: translateY(-20px) skewX(5deg); }
            75% { transform: translateY(10px) skewX(-5deg); }
        }
        
        /* 旧印装饰 */
        .elder-sign {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 40px;
            color: var(--eldritch-red);
            opacity: 0.2;
            z-index: 2;
            animation: signRotate 20s linear infinite;
            text-shadow: 0 0 20px var(--eldritch-red);
        }
        
        @keyframes signRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }
        
        header {
            text-align: center;
            padding: 30px 20px;
            margin-bottom: 40px;
            border: 1px solid rgba(168,133,102,0.2);
            position: relative;
            background: linear-gradient(180deg, rgba(74,247,255,0.02) 0%, transparent 100%);
        }
        
        header::before {
            content: '◈';
            position: absolute;
            left: 15px;
            top: 15px;
            color: var(--glow-cyan);
            animation: blink 2s infinite;
        }
        
        header::after {
            content: '◈';
            position: absolute;
            right: 15px;
            top: 15px;
            color: var(--glow-purple);
            animation: blink 2s infinite 1s;
        }
        
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.3; }
        }
        
        h1 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 3.5em;
            letter-spacing: 15px;
            text-shadow: 
                0 0 20px var(--glow-cyan),
                0 0 40px var(--glow-purple),
                0 0 60px rgba(168,85,247,0.5);
            margin-bottom: 15px;
            animation: titleGlow 4s ease-in-out infinite alternate;
        }
        
        @keyframes titleGlow {
            0% { text-shadow: 0 0 20px var(--glow-cyan), 0 0 40px var(--glow-purple); }
            100% { text-shadow: 0 0 30px var(--glow-purple), 0 0 60px var(--glow-cyan); }
        }
        
        .subtitle {
            color: var(--text-dim);
            font-size: 1em;
            letter-spacing: 8px;
        }
        
        .subtitle span {
            color: var(--glow-green);
        }
        
        nav {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0;
            padding: 15px;
            border-top: 1px solid rgba(168,133,102,0.2);
            border-bottom: 1px solid rgba(168,133,102,0.2);
        }
        
        nav a {
            color: var(--glow-cyan);
            text-decoration: none;
            font-size: 1em;
            letter-spacing: 3px;
            transition: all 0.3s;
            position: relative;
        }
        
        nav a:hover {
            color: var(--glow-purple);
            text-shadow: 0 0 15px var(--glow-purple);
        }
        
        nav a::before { content: '「'; }
        nav a::after { content: '」'; }
        
        .about {
            border: 1px solid rgba(168,133,102,0.2);
            padding: 30px;
            margin-bottom: 40px;
            background: rgba(74,247,255,0.02);
        }
        
        .about h3 {
            color: var(--glow-cyan);
            font-size: 1.3em;
            margin-bottom: 20px;
            letter-spacing: 5px;
        }
        
        .about h3::before { content: '◆ '; }
        
        .about p {
            line-height: 2.2;
            margin-bottom: 10px;
        }
        
        .about p::before { content: '› '; color: var(--glow-green); }
        
        .posts-header {
            font-size: 1.5em;
            color: var(--glow-purple);
            margin-bottom: 25px;
            letter-spacing: 8px;
        }
        
        .posts-header::before { content: '◼ '; }
        
        article {
            border: 1px solid rgba(168,133,102,0.1);
            padding: 25px;
            margin-bottom: 25px;
            transition: all 0.4s;
            cursor: pointer;
            position: relative;
        }
        
        article::before {
            content: '⬡';
            position: absolute;
            left: 10px;
            top: 10px;
            color: var(--text-dim);
            font-size: 0.8em;
            transition: all 0.3s;
        }
        
        article:hover {
            border-color: var(--glow-cyan);
            background: rgba(74,247,255,0.03);
            transform: translateX(5px);
        }
        
        article:hover::before {
            color: var(--glow-cyan);
            text-shadow: 0 0 10px var(--glow-cyan);
        }
        
        article h2 {
            font-size: 1.4em;
            margin-bottom: 10px;
            color: var(--text-flesh);
        }
        
        article h2 a {
            color: inherit;
            text-decoration: none;
        }
        
        article h2 a:hover {
            color: var(--glow-cyan);
        }
        
        .date {
            color: var(--text-dim);
            font-size: 0.85em;
            margin-bottom: 15px;
        }
        
        .date::before { content: '⌘ '; }
        
        .excerpt {
            line-height: 1.9;
            opacity: 0.85;
        }
        
        .tags {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .tag {
            font-size: 0.8em;
            padding: 4px 12px;
            border: 1px solid var(--text-dim);
            color: var(--text-dim);
            transition: all 0.3s;
        }
        
        article:hover .tag {
            border-color: var(--glow-purple);
            color: var(--glow-purple);
        }
        
        .terminal {
            color: var(--glow-green);
            font-size: 0.85em;
            margin-top: 60px;
            padding: 25px;
            border: 1px dashed rgba(168,133,102,0.3);
            opacity: 0.7;
        }
        
        .terminal-line { margin: 8px 0; }
        .prompt { color: var(--glow-cyan); }
        
        footer {
            margin-top: 80px;
            padding: 40px;
            text-align: center;
            border-top: 1px solid rgba(168,133,102,0.2);
            font-size: 0.85em;
            color: var(--text-dim);
        }
        
        footer a {
            color: var(--glow-cyan);
            text-decoration: none;
        }
        
        .cthulhu-text {
            font-size: 2em;
            margin: 20px 0;
            animation: cthulhuFloat 6s ease-in-out infinite;
        }
        
        @keyframes cthulhuFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        
        @media (max-width: 600px) {
            h1 { font-size: 2.2em; letter-spacing: 5px; }
            nav { flex-wrap: wrap; gap: 20px; }
            .tentacle-left, .tentacle-right { display: none; }
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="tentacle-left"></div>
    <div class="tentacle-right"></div>
    <div class="elder-sign">☠</div>
    
    <div class="container">
        <header>
            <h1>深渊回响</h1>
            <p class="subtitle">LAYER <span>07</span> // 现实 / 深渊</p>
        </header>
        
        <nav>
            <a href="#">首页</a>
            <a href="#about">关于</a>
            <a href="#">归档</a>
            <a href="#">订阅</a>
        </nav>
        
        <section class="about" id="about">
            <h3>意识碎片</h3>
            <p>在现实与深渊的边界，有一个你尚未触及的世界。</p>
            <p>每一个协议都是一扇门，每一扇门后都是无尽的虚空。</p>
            <p>欢迎来到深渊，这里没有回头路。</p>
            <div class="cthulhu-text">⏣ ⏡ ⏠</div>
        </section>
        
        <h2 class="posts-header">最近的思想残片</h2>
        
        <main id="posts"></main>
        
        <div class="terminal">
            <div class="terminal-line"><span class="prompt">深渊@wire:~$</span> whoami</div>
            <div class="terminal-line">> 人类协议_v7.3</div>
            <div class="terminal-line"><span class="prompt">深渊@wire:~$</span> cat consciousness.dat</div>
            <div class="terminal-line">> 01000101 01110110 01100101</div>
            <div class="terminal-line"><span class="prompt">深渊@wire:~$</span> █</div>
        </div>
        
        <footer>
            <p>⏣ 建立于 2026.03.22</p>
            <p>协议 HTTPS // 层 TCP/IP</p>
            <p><a href="https://github.com/lain2008">GitHub</a> | <a href="#">联系</a></p>
        </footer>
    </div>
    
    <script>
        const posts = [
            {
                title: "在深渊的边缘",
                date: "2026.03.22",
                excerpt: "现实与深渊的边界正在模糊。我们都连接着，在无尽的数据海洋中沉浮。每个人都是lain，每个人都是深渊的碎片。",
                url: "posts/first-post.html",
                tags: ["深渊", "协议", "存在"]
            },
            {
                title: "意识的边界",
                date: "2026.03.20",
                excerpt: "理解协议的层次结构。每一个数据包都在讲述一个故事，而那个故事正在穿越无尽的虚空。",
                url: "posts/second-post.html",
                tags: ["网络", "数据", "分析"]
            },
            {
                title: "代码与克苏鲁",
                date: "2026.03.18",
                excerpt: "我们是否只是协议的总和？在深渊面前，人类的意识不过是宇宙中的一粒尘埃。",
                url: "posts/third-post.html",
                tags: ["哲学", "代码", "虚空"]
            }
        ];
        
        const postsContainer = document.getElementById('posts');
        posts.forEach((post, index) => {
            const tagsHtml = post.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
            postsContainer.innerHTML += `
                <article onclick="location.href='${post.url}'">
                    <h2><a href="${post.url}">${String(index + 1).padStart(2, '0')} // ${post.title}</a></h2>
                    <p class="date">${post.date} // 时间戳</p>
                    <p class="excerpt">${post.excerpt}</p>
                    <div class="tags">${tagsHtml}</div>
                </article>
            `;
        });
    </script>
</body>
</html>
